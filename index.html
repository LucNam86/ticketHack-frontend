<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&family=Varela+Round&display=swap" rel="stylesheet">
  <title>Tickethack</title>
</head>

<body>
  <div id="container">
    
 <div id="header-container"></div>

  <div id="background">
  <div class="content">
    <h3>Explore the world effortlessly by train</h3>
    <h4>Compare, book and enjoy cheap prices for train tickets: your journey starts TicketHack</h4>
  </div>

  <div class="cards">
  <div class="card form-card">
  <input class="input top" type="text" placeholder="Departure" />
  <input class="input middle" type="text" placeholder="Arrival" />
  <div class="date-wrapper">
  <input class="input date" type="text" placeholder="23/06/2022" />
  <span class="icon">📅</span>
</div>
  <button class="btn-search">Search</button>
</div>

  <div class="card center">
    <img class="avatar" src="images/train.png" />
    <hr />
    <h6>It's time to book your future trip</h6>
  </div>
</div>

  </div>

  <script src="script.js"></script>
</body>

</html>
